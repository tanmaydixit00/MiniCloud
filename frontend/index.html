<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniCloud</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
      <div class="logo">
          <i class="fas fa-cloud"></i>
          <span>MiniCloud</span>
      </div>

      <nav>
          <div class="nav-item active">Workspace</div>
          <div class="nav-item">Shared</div>
          <div class="nav-item">Starred</div>
          <div class="nav-item">Recent</div>
          <div class="nav-item">Trash</div>
      </nav>

      <div class="storage-info">
          <div class="storage-header">
              <span>Storage</span>
              <span>65%</span>
          </div>
          <div class="storage-bar">
              <div class="storage-used"></div>
          </div>
          <button class="btn-upgrade">Upgrade Plan</button>
      </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
        <input type="text" placeholder="Search files..." class="search">

        <div class="header-right">
            <button class="icon-btn"><i class="fas fa-bell"></i></button>
            <div class="user">
                <img src="https://ui-avatars.com/api/?name=User">
                <span>User1</span>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <section class="content">

        <div class="content-top">
            <div>
                <h1>Workspace</h1>
                <p>All your files in one place</p>
            </div>
            <button class="primary-btn">
                <i class="fas fa-upload"></i> Upload
            </button>
        </div>

        <!-- UPLOAD AREA -->
        <div class="upload-box">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Drag & drop files or <span>browse</span></p>
            <input type="file" multiple>
        </div>

        <!-- FILE GRID -->
        <div class="file-grid">

            <div class="file">
                <i class="fas fa-file-pdf"></i>
                <p>Report.pdf</p>
            </div>

            <div class="file empty">
                <i class="fas fa-folder-open"></i>
                <p>No files yet</p>
            </div>

        </div>

    </section>

  </main>

</div>
</body>
</html>
